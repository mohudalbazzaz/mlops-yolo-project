name: CD Pipeline - Deploy to ACI

on:
  push:
    branches:
      - "**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Export ACR credentials
        run: |
          echo "CLIENT_ID=${{ secrets.CLIENT_ID }}" >> $GITHUB_ENV
          echo "CLIENT_SECRET=${{ secrets.CLIENT_SECRET }}" >> $GITHUB_ENV

      - name: Debug injected env vars
        run: |
          echo "CLIENT_ID=$CLIENT_ID"
          echo "CLIENT_SECRET length=${#CLIENT_SECRET}"

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Generate resolved container spec
        run: |
          envsubst < container_spec.yml > container_spec_resolved.yml

      - name: Debug resolved spec
        run: cat container_spec_resolved.yml

      - name: Deploy to ACI
        run: |
          az container create \
            --resource-group banana-project-rg \
            --file container_spec_resolved.yml