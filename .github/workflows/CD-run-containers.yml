name: CD Pipeline - Deploy to Container Apps

on:
  push:
    branches:
      - "**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Container Apps
        run: |
          az containerapp update \
            --name backend \
            --resource-group banana-project-rg \
            --image bananacnnproject.azurecr.io/backend:${ git rev-parse --short HEAD }

      - name: Deploy frontend to Container Apps
        run: |
          az containerapp update \
            --name frontend \
            --resource-group banana-project-rg \
            --image bananacnnproject.azurecr.io/frontend:${ git rev-parse --short HEAD }