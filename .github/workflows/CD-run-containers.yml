name: CD Pipeline - Deploy to ACI

on:
  workflow_run:
    workflows: ["CI-build-and-push-images"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to ACI using container spec
        run: |
          az container create \
            --resource-group banana-project-rg \
            --container_spec.yml