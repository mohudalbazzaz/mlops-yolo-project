apiVersion: 2019-12-01
location: uksouth
name: bananacnnproject
properties:
  osType: Linux

  identity:
    type: SystemAssigned

  containers:
    - name: backend
      properties:
        image: mcr.microsoft.com/azuredocs/aci-helloworld
        resources:
          requests:
            cpu: 1
            memoryInGb: 1.5
        ports:
          - port: 8000

    - name: frontend
      properties:
        image: mcr.microsoft.com/azuredocs/aci-helloworld
        resources:
          requests:
            cpu: 1
            memoryInGb: 1.5
        ports:
          - port: 8501
        environmentVariables:
          - name: BACKEND_URL
            value: "http://localhost:8000"

  ipAddress:
    type: Public
    ports:
      - protocol: tcp
        port: 8501